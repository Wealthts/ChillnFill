<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="/api/">
    <title>Staff Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#f3eadf] p-6 font-['Sarabun'] text-[#5f4028] flex items-center justify-center">
    <!-- Main content -->
    <main class="w-full max-w-lg">
        <section class="card w-full border border-[#e6d7c7] bg-[#fbf5ee] p-6 shadow-xl">
            <!-- Header -->
            <h1 class="mb-1 text-center text-2xl font-bold">Chill n Fill</h1>
            <p class="mb-5 text-center text-sm text-[#a97a52]">Staff Access</p>

            <!-- Messages -->
            <div id="message-container" class="mb-4"></div>

            <!-- Login and setup panels -->
            <div>
                <!-- Staff login panel -->
                <div id="staff-login-panel">
                    <p class="mb-3 text-sm text-[#a97a52]">Use Admin username or Cook ID with password.</p>
                    <input type="text" id="staff-id" placeholder="Staff ID / Username" class="input input-bordered mb-2 w-full border-[#e6d7c7] bg-[#fffaf5] focus:border-[#a97a52] focus:outline-none">
                    <input type="password" id="staff-password" placeholder="Password" class="input input-bordered mb-3 w-full border-[#e6d7c7] bg-[#fffaf5] focus:border-[#a97a52] focus:outline-none">

                    <button id="btn-staff-login" type="button" class="btn w-full border-[#7a4e2f] bg-[#7a4e2f] text-[#f3eadf] hover:border-[#5f4028] hover:bg-[#5f4028]">
                        Login
                    </button>
                    <button id="btn-first-time" type="button" class="mt-2 w-full text-center text-xs text-[#a97a52] underline-offset-2 hover:text-[#7a4e2f] hover:underline">
                        First time cook? Set password
                    </button>
                </div>

                <!-- Cook setup panel -->
                <div id="cook-setup-panel" class="hidden">
                    <div class="mb-3 rounded-xl border border-[#e6d7c7] bg-[#fffaf5] p-3 text-sm text-[#a97a52]">
                        <div id="cook-setup-title" class="font-semibold text-[#5f4028]">Create Password</div>
                        <div id="cook-setup-subtitle">Set your password for this Cook ID.</div>
                    </div>
                    <input type="password" id="cook-new-password" placeholder="New Password" class="input input-bordered mb-2 w-full border-[#e6d7c7] bg-[#fffaf5] focus:border-[#a97a52] focus:outline-none">
                    <input type="password" id="cook-confirm-password" placeholder="Confirm Password" class="input input-bordered mb-3 w-full border-[#e6d7c7] bg-[#fffaf5] focus:border-[#a97a52] focus:outline-none">
                    <button id="btn-cook-setup-password" type="button" class="btn mb-2 w-full border-[#a97a52] bg-[#a97a52] text-[#f3eadf] hover:border-[#7a4e2f] hover:bg-[#7a4e2f]">
                        Save Password
                    </button>
                    <button id="btn-cook-setup-cancel" type="button" class="btn w-full border-[#e6d7c7] bg-[#efe4d8] text-[#5f4028] hover:bg-[#f3eadf]">
                        Back to Login
                    </button>
                </div>
            </div>

            <!-- Back button -->
            <a href="index.html" class="btn mt-4 w-full border-[#e6d7c7] bg-[#efe4d8] text-[#5f4028] hover:bg-[#f3eadf]">
                Back to Home
            </a>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/staff.js?v=20260408_3"></script>
</body>
</html>
