<!DOCTYPE html>
<html lang="th" data-theme="light">

    <head>
        <meta charset="UTF-8">
    <meta name="color-scheme" content="light">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="api-base" content="/api/">
        <title>Register Chef</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap"
            rel="stylesheet">
    </head>

    <body class="min-h-screen flex justify-center items-center p-4 bg-[#f3eadf] text-[#5f4028] font-['Sarabun']">

        <div class="card bg-[#fbf5ee] border border-[#e6d7c7] rounded-2xl p-6 sm:p-10 shadow-xl max-w-md w-full">
            <div id="message-container"></div>

            <h2 class="text-[#a97a52] text-xl font-semibold mb-5 text-center">Register as Chef</h2>

            <input type="text" id="register-cook-id" placeholder="Cook ID"
                class="input input-bordered w-full bg-[#fffaf5] border-[#e6d7c7] focus:outline-none focus:border-[#a97a52] mb-2">
            <input type="password" id="register-password" placeholder="Password"
                class="input input-bordered w-full bg-[#fffaf5] border-[#e6d7c7] focus:outline-none focus:border-[#a97a52] mb-2">
            <input type="text" id="register-fullname" placeholder="Full Name"
                class="input input-bordered w-full bg-[#fffaf5] border-[#e6d7c7] focus:outline-none focus:border-[#a97a52] mb-4">

            <button id="btn-cook-register" type="button"
                class="btn w-full border-[#7a4e2f] bg-[#7a4e2f] text-[#f3eadf] hover:bg-[#5f4028] hover:border-[#5f4028] mb-2">
                Register
            </button>

            <a href="login.html#cook"
                class="btn w-full border-[#e6d7c7] bg-[#efe4d8] text-[#5f4028] hover:bg-[#f3eadf] mb-2">
                Already have an account? Log in
            </a>

            <a href="login.html"
                class="btn w-full border-[#e6d7c7] bg-[#efe4d8] text-[#5f4028] hover:bg-[#f3eadf]">
                Back to Menu
            </a>
        </div>

        <script src="../js/script.js"></script>
    </body>

</html>
