<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chill n Fill – Table Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#f3eadf] p-6 font-['Sarabun'] text-center text-[#5f4028] flex flex-col items-center justify-center">
    <!-- Main content -->
    <main class="mx-auto flex w-full max-w-5xl flex-col items-center gap-4">
        <!-- Header -->
        <h1 class="m-0 text-[1.8rem] font-bold leading-tight text-[#5f4028]">Choose a Table</h1>
        <p class="text-sm text-[#a97a52]">Select an available table to continue to customer login. Status updates come from the live API.</p>

        <div class="flex flex-wrap items-center justify-center gap-3 text-xs font-semibold uppercase tracking-[0.14em] text-[#7a4e2f]">
            <span class="rounded-full bg-[#7a4e2f] px-3 py-1 text-[#f3eadf]">Available</span>
            <span class="rounded-full bg-[#d79b49] px-3 py-1 text-[#fff9ef]">Occupied</span>
            <span class="rounded-full bg-[#7b8794] px-3 py-1 text-white">Maintenance</span>
            <span class="rounded-full bg-[#d8d1c7] px-3 py-1 text-[#7a6a5a]">Inactive</span>
        </div>

        <!-- Table buttons -->
        <section class="flex max-w-full flex-wrap items-center justify-center gap-4">
            <div class="table-seat flex h-[84px] w-[84px] cursor-pointer items-center justify-center rounded-full bg-[#7a4e2f] text-[1.1rem] font-bold tracking-[0.5px] text-[#f3eadf] shadow-[0_8px_18px_rgba(94,59,36,0.2)]" data-table="1">1</div>
            <div class="table-seat flex h-[84px] w-[84px] cursor-pointer items-center justify-center rounded-full bg-[#7a4e2f] text-[1.1rem] font-bold tracking-[0.5px] text-[#f3eadf] shadow-[0_8px_18px_rgba(94,59,36,0.2)]" data-table="2">2</div>
            <div class="table-seat flex h-[84px] w-[84px] cursor-pointer items-center justify-center rounded-full bg-[#7a4e2f] text-[1.1rem] font-bold tracking-[0.5px] text-[#f3eadf] shadow-[0_8px_18px_rgba(94,59,36,0.2)]" data-table="3">3</div>
            <div class="table-seat flex h-[84px] w-[84px] cursor-pointer items-center justify-center rounded-full bg-[#7a4e2f] text-[1.1rem] font-bold tracking-[0.5px] text-[#f3eadf] shadow-[0_8px_18px_rgba(94,59,36,0.2)]" data-table="4">4</div>
            <div class="table-seat flex h-[84px] w-[84px] cursor-pointer items-center justify-center rounded-full bg-[#7a4e2f] text-[1.1rem] font-bold tracking-[0.5px] text-[#f3eadf] shadow-[0_8px_18px_rgba(94,59,36,0.2)]" data-table="5">5</div>
            <div class="table-seat flex h-[84px] w-[84px] cursor-pointer items-center justify-center rounded-full bg-[#7a4e2f] text-[1.1rem] font-bold tracking-[0.5px] text-[#f3eadf] shadow-[0_8px_18px_rgba(94,59,36,0.2)]" data-table="6">6</div>
            <div class="table-seat flex h-[84px] w-[84px] cursor-pointer items-center justify-center rounded-full bg-[#7a4e2f] text-[1.1rem] font-bold tracking-[0.5px] text-[#f3eadf] shadow-[0_8px_18px_rgba(94,59,36,0.2)]" data-table="7">7</div>
            <div class="table-seat flex h-[84px] w-[84px] cursor-pointer items-center justify-center rounded-full bg-[#7a4e2f] text-[1.1rem] font-bold tracking-[0.5px] text-[#f3eadf] shadow-[0_8px_18px_rgba(94,59,36,0.2)]" data-table="8">8</div>
            <div class="table-seat flex h-[84px] w-[84px] cursor-pointer items-center justify-center rounded-full bg-[#7a4e2f] text-[1.1rem] font-bold tracking-[0.5px] text-[#f3eadf] shadow-[0_8px_18px_rgba(94,59,36,0.2)]" data-table="9">9</div>
            <div class="table-seat flex h-[84px] w-[84px] cursor-pointer items-center justify-center rounded-full bg-[#7a4e2f] text-[1.1rem] font-bold tracking-[0.5px] text-[#f3eadf] shadow-[0_8px_18px_rgba(94,59,36,0.2)]" data-table="10">10</div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/table.js?v=20260408_4"></script>
</body>
</html>
