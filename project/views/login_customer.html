<!DOCTYPE html>
<html lang="th">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Customer Login</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap"
            rel="stylesheet">
        <style>
            body {
                font-family: 'Sarabun', sans-serif;
            }

            .message {
                padding: 10px 14px;
                border-radius: 8px;
                margin-bottom: 12px;
                font-weight: 500; 
                font-size: 14px;
            }

            .success {
                background-color: #d1fae5;
                color: #065f46;
                border: 1px solid #6ee7b7;
            }

            .error {
                background-color: #fee2e2;
                color: #991b1b;
                border: 1px solid #fca5a5;
            }
        </style>
    </head>

    <body class="bg-gradient-to-br from-[#FF6B6B] to-[#FF8E53] min-h-screen flex justify-center items-center p-4">

        <div class="bg-white rounded-2xl p-6 sm:p-10 shadow-2xl max-w-md w-full animate-[slideDown_0.3s_ease]">
            <div id="message-container"></div>

            <h2 class="text-[#E67E22] text-xl font-semibold mb-5 text-center">Customer Login</h2>

            <input type="number" id="table-number" placeholder="Table Number"
                class="w-full p-3 border-2 border-[#FFB347] rounded-lg focus:outline-none focus:border-[#E67E22] transition-colors mb-4">

            <button onclick="customerLogin()"
                class="w-full py-3 bg-gradient-to-r from-[#E67E22] to-[#D94A2B] text-white rounded-lg font-medium hover:opacity-90 transition-opacity mb-2">
                Login
            </button>

            <a href="index.html"
                class="block text-center w-full py-3 bg-gray-500 text-white rounded-lg font-medium hover:bg-gray-600 transition-colors">
                Back to Menu
            </a>
        </div>

        <script src="script.js"></script>
    </body>

</html>
