<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-in;
        }
        .animate-slideDown {
            animation: slideDown 0.3s ease;
        }
        .message {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: 500;
            font-size: 14px;
        }
        .message.success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }
        .message.error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#FF6B6B] to-[#FF8E53] min-h-screen flex justify-center items-center p-4">

    <div class="bg-white rounded-2xl p-6 sm:p-10 shadow-2xl max-w-md w-full">
        <h1 class="text-center text-[#D94A2B] text-2xl sm:text-3xl font-bold mb-6 sm:mb-8">
            Restaurant Management System
        </h1>

        <!-- Role Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 mb-6 sm:mb-8" id="role-buttons">
            <button onclick="showLoginForm('customer')"
                class="flex-1 py-4 px-4 rounded-xl font-bold text-white bg-gradient-to-r from-[#E67E22] to-[#F39C12] hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
                Customer
            </button>
            <button onclick="showLoginForm('cook')"
                class="flex-1 py-4 px-4 rounded-xl font-bold text-white bg-gradient-to-r from-[#E74C3C] to-[#D94A2B] hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
                Chef
            </button>
            <button onclick="showLoginForm('admin')"
                class="flex-1 py-4 px-4 rounded-xl font-bold text-white bg-gradient-to-r from-[#F1C40F] to-[#E67E22] hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
                Administrator
            </button>
        </div>

        <!-- Customer Login Form -->
        <div id="customer-form" class="login-form hidden animate-fadeIn">
            <h2 class="text-[#E67E22] text-xl font-semibold mb-5">Customer Login</h2>
            <input type="number" id="table-number" placeholder="Table Number"
                class="w-full p-3 border-2 border-[#FFB347] rounded-lg focus:outline-none focus:border-[#E67E22] transition-colors mb-2">
            <button onclick="customerLogin()"
                class="w-full py-3 bg-gradient-to-r from-[#E67E22] to-[#D94A2B] text-white rounded-lg font-medium hover:opacity-90 transition-opacity mt-2">
                Login
            </button>
            <button onclick="hideAllForms()"
                class="w-full py-3 bg-gray-500 text-white rounded-lg font-medium hover:opacity-90 transition-opacity mt-2">
                Back
            </button>
        </div>

        <!-- Cook Register Form -->
        <div id="cook-register-form" class="login-form hidden animate-fadeIn">
            <h2 class="text-[#E67E22] text-xl font-semibold mb-5">Register as Cook</h2>
            <input type="text" id="register-cook-id" placeholder="Cook ID"
                class="w-full p-3 border-2 border-[#FFB347] rounded-lg focus:outline-none focus:border-[#E67E22] transition-colors mb-2">
            <input type="password" id="register-password" placeholder="Password"
                class="w-full p-3 border-2 border-[#FFB347] rounded-lg focus:outline-none focus:border-[#E67E22] transition-colors mb-2">
            <input type="text" id="register-fullname" placeholder="Full Name"
                class="w-full p-3 border-2 border-[#FFB347] rounded-lg focus:outline-none focus:border-[#E67E22] transition-colors mb-2">
            <button onclick="cookRegister()"
                class="w-full py-3 bg-gradient-to-r from-[#E67E22] to-[#D94A2B] text-white rounded-lg font-medium hover:opacity-90 transition-opacity mt-2">
                Register
            </button>
            <button onclick="showLoginForm('cook')"
                class="w-full py-3 bg-gray-200 text-[#E67E22] rounded-lg font-medium hover:bg-gray-300 transition-colors mt-2">
                Already have an account? Log in
            </button>
            <button onclick="hideAllForms()"
                class="w-full py-3 bg-gray-500 text-white rounded-lg font-medium hover:opacity-90 transition-opacity mt-2">
                Back
            </button>
        </div>

        <!-- Cook Login Form -->
        <div id="cook-login-form" class="login-form hidden animate-fadeIn">
            <h2 class="text-[#E67E22] text-xl font-semibold mb-5">Cook Login</h2>
            <input type="text" id="cook-id" placeholder="Cook ID"
                class="w-full p-3 border-2 border-[#FFB347] rounded-lg focus:outline-none focus:border-[#E67E22] transition-colors mb-2">
            <input type="password" id="cook-password" placeholder="Password"
                class="w-full p-3 border-2 border-[#FFB347] rounded-lg focus:outline-none focus:border-[#E67E22] transition-colors mb-2">
            <button onclick="cookLogin()"
                class="w-full py-3 bg-gradient-to-r from-[#E67E22] to-[#D94A2B] text-white rounded-lg font-medium hover:opacity-90 transition-opacity mt-2">
                Login
            </button>
            <button onclick="showRegisterForm()"
                class="w-full py-3 bg-gray-200 text-[#E67E22] rounded-lg font-medium hover:bg-gray-300 transition-colors mt-2">
                Don't have an account yet? Register.
            </button>
            <button onclick="hideAllForms()"
                class="w-full py-3 bg-gray-500 text-white rounded-lg font-medium hover:opacity-90 transition-opacity mt-2">
                Back
            </button>
        </div>

        <!-- Admin Login Form -->
        <div id="admin-form" class="login-form hidden animate-fadeIn">
            <h2 class="text-[#E67E22] text-xl font-semibold mb-5">Admin Login</h2>
            <input type="text" id="admin-username" placeholder="Username"
                class="w-full p-3 border-2 border-[#FFB347] rounded-lg focus:outline-none focus:border-[#E67E22] transition-colors mb-2">
            <input type="password" id="admin-password" placeholder="Password"
                class="w-full p-3 border-2 border-[#FFB347] rounded-lg focus:outline-none focus:border-[#E67E22] transition-colors mb-2">
            <button onclick="adminLogin()"
                class="w-full py-3 bg-gradient-to-r from-[#E67E22] to-[#D94A2B] text-white rounded-lg font-medium hover:opacity-90 transition-opacity mt-2">
                Login
            </button>
            <button onclick="hideAllForms()"
                class="w-full py-3 bg-gray-500 text-white rounded-lg font-medium hover:opacity-90 transition-opacity mt-2">
                Back
            </button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
